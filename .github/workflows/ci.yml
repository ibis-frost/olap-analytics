name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: olap
          POSTGRES_PASSWORD: olap
          POSTGRES_DB: olap_staging
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U olap -d olap_staging"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://olap:olap@localhost:5432/olap_staging
      DUCKDB_PATH: data/warehouse.duckdb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt
          pip install -r api/requirements.txt
          pip install -r api/requirements-dev.txt

      - name: Run ETL pipeline
        run: python scripts/run_pipeline.py

      - name: Run API tests
        run: pytest api/tests -q

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
