services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: olap
      POSTGRES_PASSWORD: olap
      POSTGRES_DB: olap_staging
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olap -d olap_staging"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
